<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f8fafc;color:#111827;font-family:Arial,sans-serif">
    <div style="max-width:520px;margin:0 auto;padding:32px 20px">
      <h1 style="margin:0 0 12px;font-size:24px;line-height:1.3">Confirm your Zuridoc account</h1>
      <p style="font-size:16px;line-height:1.6">Enter this 6-digit verification code in Zuridoc:</p>
      <p style="letter-spacing:8px;font-size:32px;font-weight:700;margin:24px 0;color:#111827">
        {{ .Token }}
      </p>
      <p style="font-size:14px;line-height:1.6;color:#4b5563">
        You can also confirm with this link:
        <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=email&next=/dashboard">Confirm email</a>
      </p>
      <p style="font-size:14px;line-height:1.6;color:#4b5563">
        If you did not create a Zuridoc account, you can ignore this email.
      </p>
    </div>
  </body>
</html>
