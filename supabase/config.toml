project_id = "nvwqrvrmisrtmlptluds"

[auth]
enabled = true
site_url = "https://zuridoc.com"
additional_redirect_urls = [
  "https://www.zuridoc.com/auth/confirm",
  "https://www.zuridoc.com/**",
  "https://zuridoc.com/auth/confirm",
  "https://zuridoc.com/**",
  "https://zuridoc.danmikeatei952.workers.dev/**",
  "http://localhost:8080/**",
  "http://localhost:5173/**",
  "http://localhost:3000/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "Your Zuridoc verification code"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Your Zuridoc password reset code"
content_path = "./supabase/templates/recovery.html"

[functions.clean-text]
verify_jwt = true

[functions.ai-assist]
verify_jwt = true
